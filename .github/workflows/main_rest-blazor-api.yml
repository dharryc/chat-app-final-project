# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - rest-blazor-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: registry-1.docker.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_F869D8675DD54D8AA6E8583415063DB0 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_CA9C6D5442164E3F92971AEAB33CFF72 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: registry-1.docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_F869D8675DD54D8AA6E8583415063DB0 }}/dharryc/rest-blazor-api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1316534E6AE642A984594539162FD9F4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E42D294C0C8642DBA1D44312453E6904 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_1E2F99FDC2994579ADA98A51B0BA6F35 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'rest-blazor-api'
          slot-name: 'Production'
          images: 'registry-1.docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_F869D8675DD54D8AA6E8583415063DB0 }}/dharryc/rest-blazor-api:${{ github.sha }}'
          