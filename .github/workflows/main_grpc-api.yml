# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: gRPC-API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: docker.io
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8883624C50654653AC711D9FB714D347 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_054A356195424237A7F2ECAADC75C2B6 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: ./WebAndMaui/gRPC-API
          push: true
          tags: docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8883624C50654653AC711D9FB714D347 }}/grpc-api-cloud-final:${{ github.sha }}
          file: ./WebAndMaui/gRPC-API/Dockerfile

  deploy:
    runs-on: ubuntu-latest

    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'gRPC-API'
          slot-name: 'Production'
          images: 'docker.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_8883624C50654653AC711D9FB714D347 }}/grpc-api-cloud-final:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_590CC27E27AC4C1CB23521FDB31FC821 }}